<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pred B-Raphaa - Aviator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #0b0c10;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(251, 191, 36, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 15, 0.3);
            border-radius: 100px;
            padding: 0.5rem 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-small {
            width: 36px;
            height: 36px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><path fill="%23fbbf24" d="M100 10L123.1 69.2H187.5L135.3 106.1L158.4 165.3L100 128.4L41.6 165.3L64.7 106.1L12.5 69.2H76.9L100 10Z"/><path fill="%23ffffff" d="M100 25L118.5 72.3H168.8L129.2 101.5L147.7 148.8L100 119.6L52.3 148.8L70.8 101.5L31.2 72.3H81.5L100 25Z"/><circle fill="%230b0c10" cx="100" cy="95" r="10"/><text x="100" y="155" font-family="Arial" font-size="20" fill="%23ffffff" text-anchor="middle" font-weight="bold">REALMADRID</text><text x="100" y="180" font-family="Arial" font-size="16" fill="%23fbbf24" text-anchor="middle" font-weight="bold">HALA MADRID</text></svg>') no-repeat center center;
            background-size: contain;
        }

        .header h1 {
            color: #fbbf24;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fbbf24, #fcd34d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .logo-large {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 1.5rem 0 2rem 0;
        }

        .logo-large-img {
            width: 120px;
            height: 120px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><path fill="%23fbbf24" d="M100 10L123.1 69.2H187.5L135.3 106.1L158.4 165.3L100 128.4L41.6 165.3L64.7 106.1L12.5 69.2H76.9L100 10Z"/><path fill="%23ffffff" d="M100 25L118.5 72.3H168.8L129.2 101.5L147.7 148.8L100 119.6L52.3 148.8L70.8 101.5L31.2 72.3H81.5L100 25Z"/><circle fill="%230b0c10" cx="100" cy="95" r="10"/><text x="100" y="155" font-family="Arial" font-size="20" fill="%23ffffff" text-anchor="middle" font-weight="bold">REALMADRID</text><text x="100" y="180" font-family="Arial" font-size="16" fill="%23fbbf24" text-anchor="middle" font-weight="bold">HALA MADRID</text></svg>') no-repeat center center;
            background-size: contain;
            margin-bottom: 0.5rem;
        }

        .logo-large h1 {
            color: #fbbf24;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fbbf24, #fde68a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            margin-bottom: 0.25rem;
        }

        .logo-large p {
            color: #64748b;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            font-weight: 400;
            text-transform: uppercase;
        }

        .card {
            background: rgba(18, 20, 25, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            color: #fbbf24;
            font-size: 0.8rem;
            margin-bottom: 1.25rem;
            letter-spacing: 0.15em;
            font-weight: 600;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title::before {
            content: '';
            width: 20px;
            height: 2px;
            background: #fbbf24;
            border-radius: 2px;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            color: #94a3b8;
            font-size: 0.7rem;
            margin-bottom: 0.4rem;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(255, 255, 255, 0.03);
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            color: #ffffff;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .input-group input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1), inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .input-group input::placeholder {
            color: #475569;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0b0c10;
            border: none;
            border-radius: 1rem;
            padding: 1rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 10px 20px -5px rgba(251, 191, 36, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -5px rgba(251, 191, 36, 0.4);
        }

        button:hover::after {
            opacity: 1;
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #ef4444;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 0.75rem;
            font-weight: 500;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.5rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .result {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(251, 191, 36, 0.03);
            border: 2px solid rgba(251, 191, 36, 0.2);
            border-radius: 1.25rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .result::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #fbbf24, transparent);
        }

        .result p {
            color: #94a3b8;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.2em;
        }

        .result h2 {
            color: #fbbf24;
            font-size: 3.5rem;
            font-weight: 800;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        .history {
            background: rgba(18, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1.25rem;
            padding: 1.25rem;
            margin-top: 1rem;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .history-header h2 {
            color: #fbbf24;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-header button {
            width: auto;
            background: rgba(255, 255, 255, 0.03);
            color: #94a3b8;
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
            font-weight: 500;
        }

        .history-header button:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
            transform: none;
            box-shadow: none;
        }

        .history-list {
            max-height: 220px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            border: 1px solid rgba(251, 191, 36, 0.1);
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: rgba(251, 191, 36, 0.3);
            background: rgba(251, 191, 36, 0.02);
        }

        .history-item-left span {
            color: #e2e8f0;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .history-item-left p {
            color: #64748b;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 0.15rem;
        }

        .history-item-right {
            color: #fbbf24;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(251, 191, 36, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .hidden {
            display: none !important;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #fbbf24;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="mainPage" class="container">
        <div class="header">
            <div class="header-left">
                <div class="logo-small"></div>
                <div>
                    <h1>Pred B-Raphaa</h1>
                    <p>Aviator</p>
                </div>
            </div>
        </div>

        <div class="logo-large">
            <div class="logo-large-img"></div>
            <h1>Pred B-Raphaa</h1>
            <p>Aviator</p>
        </div>

        <div class="card">
            <div class="card-title">PRÉDICTION</div>
            
            <div class="input-group">
                <label>⏱️ HEURE DE DÉPART (MM:SS)</label>
                <input type="text" id="startTime" placeholder="12:00" value="22:00">
            </div>

            <div class="input-group">
                <label>✖️ MULTIPLICATEUR</label>
                <input type="text" id="multiplier" placeholder="2.45" value="2.20">
            </div>

            <div class="input-group">
                <label>🔢 HEXADÉCIMAL</label>
                <input type="text" id="hex" placeholder="34576184" value="86430">
            </div>

            <button onclick="calculate()">CALCULER</button>
            <div id="calcError" class="error"></div>
            
            <div id="result" class="result" style="display: none;">
                <p>RÉSULTAT</p>
                <h2 id="resultTime">00:00</h2>
            </div>
        </div>

        <div class="history">
            <div class="history-header">
                <h2>📜 HISTORIQUE</h2>
                <button onclick="clearHistory()">EFFACER</button>
            </div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>

    <script>
        let history = [];
        loadHistory();

        function hexToDec(hex) {
            return parseInt(hex, 16);
        }

        function calculate() {
            const startTime = document.getElementById('startTime').value;
            const multiplier = document.getElementById('multiplier').value;
            const hex = document.getElementById('hex').value.replace(/\s/g, '').toLowerCase();
            const errorEl = document.getElementById('calcError');
            const resultEl = document.getElementById('result');
            const resultTimeEl = document.getElementById('resultTime');

            errorEl.textContent = '';
            
            if (!startTime || !multiplier || !hex) {
                errorEl.textContent = '❌ Veuillez remplir tous les champs';
                return;
            }

            if (!/^\d{1,3}:\d{2}$/.test(startTime)) {
                errorEl.textContent = '❌ Format heure invalide (MM:SS)';
                return;
            }

            const mult = parseFloat(multiplier.replace(',', '.'));
            if (isNaN(mult)) {
                errorEl.textContent = '❌ Multiplicateur invalide';
                return;
            }

            if (hex.length === 0) {
                errorEl.textContent = '❌ Hexadécimal vide';
                return;
            }

            const intPart = Math.floor(mult);
            const decimalStr = multiplier.replace(',', '.').split('.')[1] || '00';
            const decPadded = decimalStr.padEnd(2, '0').slice(0, 2);
            
            const dec1 = parseInt(decPadded[0], 10);
            const dec2 = parseInt(decPadded[1], 10);

            if (intPart < 1 || intPart > hex.length) {
                errorEl.textContent = '❌ Prediction indisponible, trouve une nouvelle référence';
                return;
            }
            if (dec1 < 1 || dec1 > hex.length) {
                errorEl.textContent = '❌ Prediction indisponible, trouve une nouvelle référence';
                return;
            }
            if (dec2 < 1 || dec2 > hex.length) {
                errorEl.textContent = '❌ Prediction indisponible, trouve une nouvelle référence';
                return;
            }

            const val1 = hexToDec(hex[intPart - 1]);
            const val2 = hexToDec(hex[dec1 - 1]);
            const val3 = hexToDec(hex[dec2 - 1]);
            
            let minutes = val1;
            let seconds = parseInt(`${val2}${val3}`, 10);

            if (seconds >= 60) {
                minutes += Math.floor(seconds / 60);
                seconds = seconds % 60;
            }

            const [startM, startS] = startTime.split(':').map(Number);
            let totalM = startM + minutes;
            let totalS = startS + seconds;

            if (totalS >= 60) {
                totalM += Math.floor(totalS / 60);
                totalS = totalS % 60;
            }

            const result = `${String(totalM).padStart(2, '0')}:${String(totalS).padStart(2, '0')}`;
            resultTimeEl.textContent = result;
            resultEl.style.display = 'block';

            const historyItem = {
                id: Date.now(),
                startTime: startTime,
                multiplier: multiplier,
                hex: hex,
                result: result
            };
            history.unshift(historyItem);
            
            if (history.length > 15) {
                history = history.slice(0, 15);
            }
            
            saveHistory();
        }

        function saveHistory() {
            localStorage.setItem('pred_history', JSON.stringify(history));
            displayHistory();
        }

        function loadHistory() {
            const saved = localStorage.getItem('pred_history');
            if (saved) {
                history = JSON.parse(saved);
            }
            displayHistory();
        }

        function clearHistory() {
            if (confirm('Effacer tout l\'historique ?')) {
                history = [];
                saveHistory();
            }
        }

        function displayHistory() {
            const historyList = document.getElementById('historyList');

            if (history.length === 0) {
                historyList.innerHTML = '<div style="text-align: center; color: #64748b; padding: 1rem;">Aucun calcul</div>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-item-left">
                        <span>${item.startTime} × ${item.multiplier}</span>
                        <p>${item.hex}</p>
                    </div>
                    <div class="history-item-right">${item.result}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
